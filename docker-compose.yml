name: taskflow-api

services:
  app:
    build:
      context: .
      target: development
    image: taskflow-api/app:dev
    container_name: taskflow_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    # DB connection config comes from .env (read by Laravel at boot), not injected here —
    # process-level env vars would take priority over .env AND over phpunit.xml's test
    # overrides (sqlite :memory:), silently breaking the test suite inside this container.
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - taskflow

  nginx:
    image: nginx:1.27-alpine
    container_name: taskflow_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - taskflow

  mysql:
    image: mysql:8.0
    container_name: taskflow_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-taskflow}
      MYSQL_USER: ${DB_USERNAME:-taskflow}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secret}
    # No host port published by default — the app container reaches MySQL over the
    # internal "taskflow" network. Uncomment below (and pick a free host port) if you
    # need to connect a local MySQL client/GUI directly to this container.
    # ports:
    #   - "${DB_FORWARD_PORT:-3307}:3306"
    volumes:
      - taskflow_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root_secret}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - taskflow

networks:
  taskflow:
    driver: bridge

volumes:
  taskflow_mysql_data:
